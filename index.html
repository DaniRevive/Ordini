<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Ordini - Quantità</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { border-bottom: 3px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-add { background: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 6px; margin-bottom: 20px; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 18px; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; box-shadow: 0 4px 0 #1e8449; }
        .btn-save:active { box-shadow: none; transform: translateY(4px); }
        #status { text-align: center; margin-top: 20px; font-weight: bold; font-size: 1.1em; }
        .remove-btn { background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📦 Inserimento Ordini</h2>
    </header>
    
    <div style="margin-bottom:25px;">
        <label><b>Nome Cliente:</b></label><br>
        <input type="text" id="cliente" placeholder="Inserisci il nome del cliente..." style="width:100%; margin-top:8px;">
    </div>

    <div id="lista-prodotti">
        <div class="row">
            <input type="text" placeholder="Prodotto" class="p-nome" style="flex:3;">
            <input type="number" placeholder="Quantità" class="p-quantita" value="1" min="1" style="flex:1; text-align:center;">
            <select class="p-stato" style="flex:1.5;">
                <option value="In Attesa">In Attesa</option>
                <option value="Consegnato">Consegnato</option>
            </select>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="aggiungiRiga()">+ Aggiungi un altro articolo</button>
    <button type="button" class="btn-save" id="btnInvia" onclick="inviaDati()">REGISTRA ORDINE</button>
    
    <div id="status"></div>
</div>

<script>
    // ⚠️ INCOLLA IL TUO NUOVO URL DI GOOGLE APPS SCRIPT QUI SOTTO
    const WEB_APP_URL = 'INSERISCI_QUI_IL_TUO_URL_APPS_SCRIPT';

    function aggiungiRiga() {
        const riga = document.createElement('div');
        riga.className = 'row';
        riga.innerHTML = `
            <input type="text" placeholder="Prodotto" class="p-nome" style="flex:3;">
            <input type="number" placeholder="Quantità" class="p-quantita" value="1" min="1" style="flex:1; text-align:center;">
            <select class="p-stato" style="flex:1.5;">
                <option value="In Attesa">In Attesa</option>
                <option value="Consegnato">Consegnato</option>
            </select>
            <button onclick="this.parentElement.remove()" class="remove-btn">×</button>
        `;
        document.getElementById('lista-prodotti').appendChild(riga);
    }

    async function inviaDati() {
        const cliente = document.getElementById('cliente').value.trim();
        if (!cliente) return alert("Per favore, inserisci il nome del cliente.");

        const righe = document.querySelectorAll('.row');
        const dataOggi = new Date().toLocaleDateString('it-IT');
        const idOrdine = "ID-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        
        let listaOrdini = [];

        righe.forEach(r => {
            const nome = r.querySelector('.p-nome').value.trim();
            const qta = r.querySelector('.p-quantita').value;
            const stato = r.querySelector('.p-stato').value;
            
            if (nome && qta) {
                listaOrdini.push({
                    id: idOrdine,
                    data: dataOggi,
                    cliente: cliente,
                    prodotto: nome,
                    quantita: qta,
                    stato: stato
                });
            }
        });

        if (listaOrdini.length === 0) return alert("Inserisci almeno un prodotto.");

        const btn = document.getElementById('btnInvia');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerHTML = "⏳ Invio dei dati al foglio Excel...";
        status.style.color = "#3498db";

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ ordini: listaOrdini })
            });

            status.innerHTML = "✅ ORDINE REGISTRATO! Pagina in aggiornamento...";
            status.style.color = "#27ae60";
            
            setTimeout(() => {
                location.reload();
            }, 2500);

        } catch (error) {
            status.innerHTML = "❌ Errore di connessione. Riprova.";
            status.style.color = "#e74c3c";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
