<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ordini Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #18bc9c; padding-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #18bc9c; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; width: 100%; font-weight: bold; }
        button:hover { background: #148f77; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #2c3e50; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Gestione Ordini</h2>

    <div id="loginSection" class="section">
        <h3>Accedi per inserire dati</h3>
        <input type="password" id="adminPass" placeholder="Inserisci Password">
        <button onclick="login()">Sblocca Inserimento</button>
    </div>

    <div id="inputSection" class="section hidden">
        <h3>Nuovo Ordine</h3>
        <input type="text" id="cliente" placeholder="Nome Cliente">
        <input type="text" id="prodotto" placeholder="Cosa ha ordinato?">
        <input type="number" id="totale" placeholder="Importo Totale €">
        <select id="stato">
            <option value="In Attesa">In Attesa</option>
            <option value="Completato">Completato</option>
            <option value="Pagato">Pagato</option>
        </select>
        <button id="btnInvia" onclick="salvaSuExcel()">Salva su Excel</button>
        <p id="statusMsg" style="text-align:center; font-weight:bold;"></p>
    </div>

    <div class="section">
        <h3>Registro Ordini Attuali</h3>
        <div id="loading">Caricamento dati...</div>
        <table id="tabellaOrdini">
            <thead><tr id="headers"></tr></thead>
            <tbody id="corpoTabella"></tbody>
        </table>
    </div>
</div>

<script>
    // --- CONFIGURAZIONE ---
    const SCRIPT_URL = 'INSERISCI_QUI_IL_TUO_URL_APPS_SCRIPT'; // Incolla l'URL /exec qui
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/1uwMmxJAPnlgceN3pNalS_JA9onxGd9hBO3xvMGyC4Lc/export?format=csv';
    const PASSWORD_CORRETTA = "1234"; // Cambiala a tuo piacimento

    // LOGIN
    function login() {
        const pass = document.getElementById('adminPass').value;
        if(pass === PASSWORD_CORRETTA) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
        } else {
            alert("Password errata!");
        }
    }

    // SALVATAGGIO DATI
    async function salvaSuExcel() {
        const btn = document.getElementById('btnInvia');
        const msg = document.getElementById('statusMsg');
        
        const nuovoOrdine = {
            id: "#" + Math.floor(1000 + Math.random() * 9000),
            data: new Date().toLocaleDateString('it-IT'),
            cliente: document.getElementById('cliente').value,
            prodotto: document.getElementById('prodotto').value,
            totale: document.getElementById('totale').value,
            stato: document.getElementById('stato').value
        };

        if(!nuovoOrdine.cliente || !nuovoOrdine.totale) {
            alert("Compila i campi Cliente e Totale!");
            return;
        }

        btn.disabled = true;
        msg.style.color = "orange";
        msg.textContent = "Invio in corso...";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(nuovoOrdine)
            });
            
            msg.style.color = "green";
            msg.textContent = "✅ Salvato! Ricarico la tabella...";
            
            // Pulisce campi
            document.getElementById('cliente').value = '';
            document.getElementById('prodotto').value = '';
            document.getElementById('totale').value = '';

            setTimeout(() => { location.reload(); }, 1500);
        } catch (e) {
            msg.style.color = "red";
            msg.textContent = "Errore durante il salvataggio.";
            btn.disabled = false;
        }
    }

    // CARICAMENTO TABELLA
    function caricaTabella() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                const body = document.getElementById('corpoTabella');
                const head = document.getElementById('headers');
                
                if(data.length > 0) {
                    Object.keys(data[0]).forEach(h => head.innerHTML += `<th>${h}</th>`);
                    data.forEach(row => {
                        let tr = "<tr>";
                        Object.values(row).forEach(v => tr += `<td>${v}</td>`);
                        body.innerHTML += tr + "</tr>";
                    });
                }
                document.getElementById('loading').style.display = 'none';
            }
        });
    }

    window.onload = caricaTabella;
</script>

</body>
</html>
